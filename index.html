<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prevent Baeksoo...</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Pretendard:wght@100..900&family=Inter:wght@300;400;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            /* 기본 색상 테마 */
            --bg-color: #FFF5E4;
            --text-main: #333333;
            --accent-color: #000000;

            /* 글자 굵기 */
            --days-font-weight: 500;
            --percentage-font-weight: 500;
            --footer-font-weight: 500;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            font-family: 'Pretendard', 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            width: 100%;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 전체 감싸는 컨테이너 */
        .page-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            opacity: 0;
            animation: fadeIn 1.2s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /*
         * 이미지 기준 컨테이너.
         * 이미지의 크기에 맞춰 컨테이너가 결정되고,
         * 텍스트는 이 컨테이너에 대해 %로 배치됩니다.
         * → 화면이 줄어들면 이미지도 줄어들고, 텍스트도 비례 이동.
         */
        .image-container {
            position: relative;
            display: inline-block;
            max-width: 100%;
            max-height: 90vh;
        }

        .image-container img {
            display: block;
            max-width: 100%;
            max-height: 90vh;
            height: auto;
            object-fit: contain;
        }

        /*
         * 텍스트 오버레이 공통.
         * position: absolute + % 좌표로 이미지 위에 배치.
         */
        .overlay-text {
            position: absolute;
            white-space: nowrap;
            pointer-events: none;
        }

        /*
         * "XX일 차" — 말풍선 중앙 부분에 위치.
         * top/left %를 조절하여 위치를 잡습니다.
         */
        .days {
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(1.8rem, 5vw, 3.5rem);
            font-weight: var(--days-font-weight);
            letter-spacing: -0.02em;
            text-align: center;
        }

        /*
         * "올해도 XX%가 지났다..." — 말풍선 아래쪽 오른편.
         */
        .percentage {
            top: 26%;
            left: 60%;
            transform: translate(-50%, -50%);
            font-size: clamp(0.75rem, 2.5vw, 1.4rem);
            font-weight: var(--percentage-font-weight);
            color: var(--accent-color);
            letter-spacing: -0.04em;
            line-height: 1;
            text-shadow: 0 4px 15px rgba(255, 255, 255, 0.5);
            text-align: center;
        }

        .percentage span {
            display: inline-block;
        }

        /*
         * 하단 동기부여 문구.
         */
        .footer {
            bottom: 2%;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(0.7rem, 2vw, 1.2rem);
            font-weight: var(--footer-font-weight);
            max-width: 80%;
            line-height: 1.5;
            text-align: center;
            white-space: normal;
            word-break: keep-all;
        }
    </style>
</head>

<body>

    <div class="page-wrapper">
        <div class="image-container">
            <!-- 배경 이미지를 <img>로 삽입하여 화면에 비례 축소되게 함 -->
            <img src="https://marron-love.github.io/prevent_baeksoo/bg.jpg" alt="백수 방지 배경">

            <!-- 텍스트 오버레이: % 기반 위치 -->
            <div class="days overlay-text">
                <span><span id="days">0</span>일 차</span>
            </div>

            <div class="percentage overlay-text">
                <span>올해도 <span id="percentage">0.0%</span>가 지났다...</span>
            </div>

            <div id="motivation-text" class="footer overlay-text">
                <!-- 동적으로 삽입됨 -->
            </div>
        </div>
    </div>

    <script>
        const motivationData = [
            "희망퇴직 할때 나가는게 좀더 이득이지않을까",
            "당신 만기PC 아직 못받았어",
            "눈치 안보고 점심 혼밥 가능한 기회를 놓치지 마세요",
            "원래 좋은때랑 싫은때는 번갈아서 옴",
            "치즈와 파, 치킨과 귤을 좋아하는 미남을 생각하라",
            "일어나서 눈꼽만 떼고 가도 되는 회사는 흔치 않단다.",
            "전국 각지의 빵을 공짜로 맛보게 해주는 팀은 없습니다",
            "단 거 먹어",
            "당신의 일급은 10만원이 넘습니다.",
            "데이트를 더 즐겁게 하는 법: 워킹데이를 바쁘게 보내기",
            "밖은 추워",
            "이 순간만 잘 참으면 또 오래 다닐수 있다 하던데",
            "내가 언제 대기업 또 다녀보겠냐",
            "복지포인트, 명절선물, 보험, forest, 건강검진 레츠고",
            "어차피 오늘 사표내도 당장 못 그만둠",
            "이것도 부둥부둥해주는 것일지 모릅니다.",
            "뇌빼고 MZ행동을해도 괜찮은 곳이 흔할까?",
            "지금 좀 벌어두면 은퇴 앞당길 수 있음",
            "바클보단 낫잖아 한잔해",
            "ㄱㅊ 낼모레되면 빡쳤던거 까먹음",
            "근데 그만두면 다시 일하고 싶을듯",
            "일단 많이 벌 수 있을때 좀 버티장",
            "진짜 에바인거같을때 나와도 늦지않음",
            "이번주 주말은 진짜 완전 보람차고 즐거울듯",
            "빵 먹엉",
            "빠퇴해",
            "네임밸류에 비해 짜치는 건 사실이지만 전체로 보면 선녀급이지",
            "그치만 다른 회사에 이런사람들이 없을거라는 보장이 없음",
            "힘 좀 빼도 돼",
            "다 부수는 노래 들으면서 산책 가자",
            "남아있으면 깜짝 이벤트로 김재혁이 밥 먹으러 방문함!",
            "다른 회사 어떤지 봤잖아...",
            "일어나...재혁이랑 {selected_content} 해야지..."
        ];

        const wishlist = [
            "로맨틱한 유후인 온천 여행",
            "제주도 연돈 격파",
            "스윗 홈에서 뒹굴뒹굴",
            "퇴근 후 서로를 격려하며 맥주 한 잔",
            "**결혼**",
            "❤️재충전 다 붙인 유럽 신혼여행❤️",
            "괜히 어디론가 떠나고 싶을때를 대비해 총알 장전",
            "주말 아점 브런치빈 데이트",
            "어쩌구저쩌구 각종 염천 커플데이 기념",
            "개빡세게 일할수록 즐거운 데이트"
        ];

        function getRandomMotivation() {
            let sentence = motivationData[Math.floor(Math.random() * motivationData.length)];

            if (sentence.includes("{selected_content}")) {
                const wish = wishlist[Math.floor(Math.random() * wishlist.length)];
                sentence = sentence.replace("{selected_content}", wish);
            }

            return sentence;
        }

        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            obj.setAttribute('data-animating', 'true');

            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const easeOut = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
                const currentVal = start + (end - start) * easeOut;

                obj.innerText = currentVal.toFixed(1) + '%';

                if (progress < 1) {
                    window.requestAnimationFrame(step);
                } else {
                    obj.innerText = end.toFixed(1) + '%';
                    obj.removeAttribute('data-animating');
                }
            };
            window.requestAnimationFrame(step);
        }

        function updateProgress() {
            const year = 2026;
            const now = new Date();

            const startOfYear = new Date(year, 0, 1);
            const endOfYear = new Date(year + 1, 0, 1);

            const totalMs = endOfYear.getTime() - startOfYear.getTime();
            let passedMs = now.getTime() - startOfYear.getTime();

            if (passedMs < 0) passedMs = 0;
            if (passedMs > totalMs) passedMs = totalMs;

            const passedDays = Math.floor(passedMs / (1000 * 60 * 60 * 24)) + 1;
            const percentage = (passedMs / totalMs) * 100;

            const daysEl = document.getElementById('days');
            const percEl = document.getElementById('percentage');

            if (daysEl) daysEl.innerText = passedDays;

            if (percEl) {
                if (percEl.getAttribute('data-init') !== 'true') {
                    percEl.setAttribute('data-init', 'true');
                    animateValue(percEl, 0, percentage, 1500);
                } else if (!percEl.hasAttribute('data-animating')) {
                    percEl.innerText = percentage.toFixed(1) + '%';
                }
            }
        }

        // 초기 메시지 설정
        const motivationEl = document.getElementById('motivation-text');
        if (motivationEl) {
            motivationEl.innerText = getRandomMotivation();
        }

        // 실행
        updateProgress();
        setInterval(updateProgress, 1000);
    </script>
</body>

</html>
